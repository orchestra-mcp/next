name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-next
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Next.js frontend
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e
            export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
            /opt/orchestra/deploy.sh next

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "--- Health Check ---"
            curl -sf http://localhost:3000 > /dev/null && echo " Next.js: OK" || (echo " Next.js: FAILED" && exit 1)
            echo "--- Service Status ---"
            sudo systemctl status orchestra-next --no-pager -l | head -5
