name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-next
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Next.js frontend
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Notify Discord — Deploy started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deploy Started — Next.js",
                "description": "Next.js frontend deploy triggered by **${{ github.actor }}**",
                "color": 3447003,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Commit", "value": "`${{ github.sha }}`", "inline": true}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e
            export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin:$HOME/.local/share/pnpm:$HOME/.local/bin

            DEPLOY_DIR="$HOME/orchestra-next"

            echo "--- Ensuring deploy directory ---"
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/orchestra-mcp/next.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            echo "--- Pulling latest ---"
            git fetch origin master
            git reset --hard origin/master

            echo "--- Installing pnpm ---"
            export COREPACK_ENABLE_STRICT=0
            corepack enable 2>/dev/null || true
            corepack prepare pnpm@latest --activate 2>/dev/null || true

            echo "--- Installing dependencies ---"
            npx --yes pnpm install --no-frozen-lockfile

            echo "--- Copying env ---"
            [ -f /opt/orchestra/env/next.env ] && cp /opt/orchestra/env/next.env .env.local
            [ -f "$HOME/orchestra-next.env" ] && cp "$HOME/orchestra-next.env" .env.local

            echo "--- Building ---"
            npx --yes next build

            echo "--- Restarting with PM2 ---"
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2 || npx --yes pm2 --version
            pm2 delete orchestra-next 2>/dev/null || true
            pm2 start npx --name orchestra-next -- next start -p 3000
            pm2 save

            echo "--- Deploy complete ---"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "--- Health Check ---"
            sleep 5
            curl -sf http://localhost:3000 > /dev/null && echo " Next.js: OK" || (echo " Next.js: FAILED" && exit 1)
            echo "--- PM2 Status ---"
            pm2 list || npx --yes pm2 list

      - name: Notify Discord — Deploy succeeded
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Deploy Succeeded — Next.js",
                "description": "Next.js frontend is live.",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'

      - name: Notify Discord — Deploy failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Deploy Failed — Next.js",
                "description": "Next.js frontend deploy failed. Check the Actions log.",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'
