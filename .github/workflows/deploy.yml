name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-next
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Next.js frontend
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Notify Discord — Deploy started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deploy Started — Next.js",
                "description": "Next.js frontend deploy triggered by **${{ github.actor }}**",
                "color": 3447003,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Commit", "value": "`${{ github.sha }}`", "inline": true}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e

            DEPLOY_DIR="$HOME/orchestra-next"

            echo "--- Ensuring deploy directory ---"
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/orchestra-mcp/next.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            echo "--- Pulling latest ---"
            git fetch origin master
            git reset --hard origin/master
            echo "Commit: $(git rev-parse --short HEAD)"

            echo "--- Installing dependencies ---"
            pnpm install --no-frozen-lockfile

            echo "--- Copying env ---"
            [ -f /opt/orchestra/env/next.env ] && cp /opt/orchestra/env/next.env .env.local

            echo "--- Building ---"
            rm -rf .next
            npx next build

            echo "--- Restarting with PM2 ---"
            pm2 delete orchestra-next 2>/dev/null || true
            pm2 start "npx next start -p 3000" --name orchestra-next --cwd "$DEPLOY_DIR"
            pm2 save --force

            echo "--- Health check ---"
            sleep 5
            for i in $(seq 1 15); do
              curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Next.js: healthy (attempt $i)" && break
              [ "$i" -eq 15 ] && echo "FATAL: Next.js health check failed" && pm2 logs orchestra-next --lines 30 --nostream && exit 1
              sleep 3
            done

            echo "--- PM2 Status ---"
            pm2 list

            echo "--- Deploy complete ---"

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ] && echo "No CF credentials, skipping purge" && exit 0
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' | grep -q '"success":true' && echo "Cloudflare cache purged" || echo "CF purge failed (non-fatal)"

      - name: Notify Discord — Deploy succeeded
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Deploy Succeeded — Next.js",
                "description": "Next.js frontend is live.",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'

      - name: Notify Discord — Deploy failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Deploy Failed — Next.js",
                "description": "Next.js frontend deploy failed. Check the Actions log.",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Run", "value": "[View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "orchestra/next"}
              }]
            }'
